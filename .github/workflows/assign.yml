name: Auto-assign

on:
  pull_request:
    types: [opened, reopened]
  issues:
    types: [opened, reopened]

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign adolfousier
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh api repos/${{ github.repository }}/pulls/${{ github.event.number }} -X PATCH -f add_assignees[]="adolfousier"
          else
            gh api repos/${{ github.repository }}/issues/${{ github.event.number }} -X PATCH -f add_assignees[]="adolfousier"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
